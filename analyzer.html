<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicBroom — Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
  <div style="display:flex;align-items:flex-end;">
    <div class="logo">Music<span>Broom</span></div>
    <span class="version-badge"></span>
  </div>
  <div class="nav-tabs">
    <a class="tab-btn active" href="analyzer.html">Analyzer</a>
    <a class="tab-btn" href="sorter.html">Sorter</a>
  </div>
  <div id="user-pill" onclick="toggleUserDropdown(event)">
    <img id="user-avatar" alt="avatar">
    <span id="user-name">–</span>
    <span id="user-pill-chevron">▼</span>
    <div id="user-dropdown">
      <div class="user-dropdown-item" onclick="logout()">↩ Sign out</div>
    </div>
  </div>
</nav>

<main>
  <div class="section-head">
    <h2>Playlist Analyzer</h2>
  </div>
  <p style="color:var(--text2);margin-bottom:20px;font-size:13px;">Pick a playlist to see its genre breakdown and track list.</p>

  <div class="playlist-controls">
    <button class="btn-ghost pl-filter-mine" onclick="setPlaylistFilter(playlistFilter === 'mine' ? 'all' : 'mine')">My playlists</button>
    <button class="btn-ghost pl-filter-public" onclick="setPlaylistHidePrivate(!playlistHidePrivate)">Public only</button>
    <select class="pl-sort-select" onchange="setPlaylistSort(this.value)">
      <option value="default">Default order</option>
      <option value="tracks-desc">Most tracks first</option>
      <option value="tracks-asc">Fewest tracks first</option>
    </select>
  </div>
  <div id="analyzer-playlists" class="playlist-grid">
    <div class="spinner"></div>
  </div>

  <div id="analyzer-result" style="display:none;">
    <div class="stats-grid" id="analyzer-stats"></div>
    <div class="genre-chart-wrap">
      <div class="section-head" style="margin-bottom:16px;">
        <h2 style="font-size:16px;">Genre breakdown</h2>
      </div>
      <div id="genre-bars"></div>
    </div>
    <div class="track-table-wrap">
      <div class="track-table-head">
        <div class="col-num">#</div>
        <div style="flex:1;">Track</div>
        <div style="width:120px;">Genre</div>
        <div class="col-dur">Time</div>
      </div>
      <div id="analyzer-tracks"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="js/shared.js"></script>
<script src="js/analyzer.js"></script>
</body>
</html>
