<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicBroom — Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
  <div style="display:flex;align-items:flex-end;">
    <div class="logo">Music<span>Broom</span></div>
    <span class="version-badge"></span>
  </div>
  <div class="nav-tabs">
    <a class="tab-btn active" href="analyzer.html">Analyzer</a>
    <a class="tab-btn" href="sorter.html">Sorter</a>
  </div>
  <div id="user-pill" onclick="toggleUserDropdown(event)">
    <img id="user-avatar" alt="avatar">
    <span id="user-name">–</span>
    <span id="user-pill-chevron">▼</span>
    <div id="user-dropdown">
      <div class="user-dropdown-item" onclick="logout()">↩ Sign out</div>
    </div>
  </div>
</nav>

<main>
  <div class="section-head">
    <h2>Playlist Analyzer</h2>
  </div>
  <p style="color:var(--text2);margin-bottom:20px;font-size:13px;">Choose a playlist to see its stats and full track list.</p>

  <div style="margin-bottom:24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
    <p style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin:0;">Playlist</p>
    <button class="btn-ghost" id="choose-analyzer-playlist-btn" onclick="openAnalyzerPlaylistModal()">Choose playlist</button>
    <span id="selected-analyzer-playlist-name" style="font-size:13px;color:var(--text2);display:none;"></span>
  </div>

  <div id="analyzer-result" style="display:none;">
    <div class="stats-grid" id="analyzer-stats"></div>
    <div class="track-table-wrap">
      <div class="track-table-head">
        <div class="col-num">#</div>
        <div style="flex:1;">Track</div>
        <div class="col-dur">Time</div>
      </div>
      <div id="analyzer-tracks"></div>
    </div>
  </div>
</main>

<!-- ANALYZER PLAYLIST PICKER MODAL -->
<div class="modal-backdrop" id="analyzer-playlist-modal" onclick="closeAnalyzerPlaylistModal()">
  <div class="modal modal-wide" onclick="event.stopPropagation()">
    <h3>Choose playlist</h3>
    <p>Select a playlist to analyze.</p>
    <div class="playlist-controls" style="margin-bottom:16px;">
      <button class="btn-ghost pl-filter-mine" onclick="setPlaylistFilter(playlistFilter === 'mine' ? 'all' : 'mine')">My playlists</button>
      <button class="btn-ghost pl-filter-public" onclick="setPlaylistHidePrivate(!playlistHidePrivate)">Public only</button>
      <select class="pl-sort-select" onchange="setPlaylistSort(this.value)">
        <option value="default">Default order</option>
        <option value="tracks-desc">Most tracks first</option>
        <option value="tracks-asc">Fewest tracks first</option>
      </select>
    </div>
    <div id="analyzer-playlists" class="playlist-grid modal-playlist-grid">
      <div class="spinner"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeAnalyzerPlaylistModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/shared.js"></script>
<script src="js/analyzer.js"></script>
</body>
</html>
