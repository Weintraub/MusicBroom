<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicBroom — Sorter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
  <div style="display:flex;align-items:flex-end;">
    <div class="logo">Music<span>Broom</span></div>
    <span class="version-badge"></span>
  </div>
  <div class="nav-tabs">
    <a class="tab-btn" href="analyzer.html">Analyzer</a>
    <a class="tab-btn active" href="sorter.html">Sorter</a>
  </div>
  <div id="user-pill" onclick="toggleUserDropdown(event)">
    <img id="user-avatar" alt="avatar">
    <span id="user-name">–</span>
    <span id="user-pill-chevron">▼</span>
    <div id="user-dropdown">
      <div class="user-dropdown-item" onclick="logout()">↩ Sign out</div>
    </div>
  </div>
</nav>

<main>
  <div class="section-head">
    <h2>Playlist Sorter</h2>
  </div>
  <p style="color:var(--text2);margin-bottom:20px;font-size:13px;">Choose your "master" (uncategorized) playlist, then move tracks into your genre playlists.</p>

  <div style="margin-bottom:24px;">
    <p style="font-size:12px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;">Master playlist</p>
    <div class="playlist-controls">
      <button class="btn-ghost pl-filter-mine" onclick="setPlaylistFilter(playlistFilter === 'mine' ? 'all' : 'mine')">My playlists</button>
      <select class="pl-sort-select" onchange="setPlaylistSort(this.value)">
        <option value="default">Default order</option>
        <option value="tracks-desc">Most tracks first</option>
        <option value="tracks-asc">Fewest tracks first</option>
      </select>
    </div>
    <div id="sorter-playlists" class="playlist-grid">
      <div class="spinner"></div>
    </div>
  </div>

  <div id="sorter-tracks-wrap" style="display:none;">
    <div class="filter-bar">
      <input type="text" id="sorter-search" placeholder="Search tracks..." oninput="filterSorterTracks()">
      <select id="sorter-genre-filter" onchange="filterSorterTracks()">
        <option value="">All genres</option>
      </select>
    </div>
    <div class="track-table-wrap">
      <div class="track-table-head">
        <div class="col-num">#</div>
        <div style="flex:1;">Track</div>
        <div style="width:130px;">Genre</div>
        <div style="width:160px;">Add to playlist</div>
      </div>
      <div id="sorter-tracks"></div>
    </div>
    <button class="load-more-btn" id="load-more-btn" onclick="loadMoreSorterTracks()" style="display:none;">Load more tracks</button>
  </div>
</main>

<!-- ADD TO PLAYLIST MODAL -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h3 id="modal-title">Add to playlist</h3>
    <p id="modal-sub">Choose a playlist to add this track to.</p>
    <div class="playlist-picker" id="modal-picker"></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/shared.js"></script>
<script src="js/sorter.js"></script>
</body>
</html>
